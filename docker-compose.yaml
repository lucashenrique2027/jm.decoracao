name: loja-jm-decoracao-prod
services:
  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres: 
        condition: service_healthy
    networks:
      - app
      - services
      - storage
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vite-app:
    build:
      context: .
      dockerfile: docker/vite/Dockerfile
    expose:
      - "80"
    networks:
      - app
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      vite-app:
        condition: service_started
    networks:
      - app
    restart: unless-stopped

  postgres: 
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}  
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - services
    healthcheck:
        test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
        interval: 10s
        timeout: 5s
        retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: jm_storage_images
    ports:
      - "9001:9001"
      - "9000:9000"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 20s
    volumes:
      - minio_data:/data
      - ./scripts/entryMinio.sh:/usr/bin/entryMinio.sh
    entrypoint: /bin/sh
    command: /usr/bin/entryMinio.sh
    networks:
      - app
      - storage
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  app:
    driver: bridge
  services:
    driver: bridge
  storage:
    driver: bridge