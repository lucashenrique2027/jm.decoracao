# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Conexões via socket Unix local exigem senha (sem mais "trust")
local   all             all                                     scram-sha-256

# Conexões TCP vindas de dentro dos containers da rede "services"
host    all             all             172.16.0.0/12           scram-sha-256

# Loopback (caso algo precise conectar via 127.0.0.1 dentro do próprio container)
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# Qualquer outra origem é rejeitada explicitamente
host    all             all             0.0.0.0/0               reject