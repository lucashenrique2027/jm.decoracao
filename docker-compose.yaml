version: '3'

services:
  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    ports:
      - "3000:3000"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - app
    volumes:
       - ./frontend/dist:/usr/shar/nginx/html
       - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
