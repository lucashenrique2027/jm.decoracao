services:
  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    env_file:
      - .env
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vite-app:
    build:
      context: .
      dockerfile: docker/vite/Dockerfile
    volumes:
      - /app/node_modules
      - ./frontend:/app/frontend
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
      vite-app:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${}
      POSTGRES_DB: ${DB_NAME}  
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    healthcheck:
        test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
        interval: 10s
        timeout: 5s
        retries: 5
    restart: unless-stopped

volumes:
  postgres_data:


networks:
  app-network:
    driver: bridge