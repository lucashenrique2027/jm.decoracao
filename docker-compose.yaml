services:
  app:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    env_file:
      - .env
    depends_on:
      postgres: 
        condition: service_healthy
    ports:
      - "3001:3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  vite-app:
    build:
      context: .
      dockerfile: docker/vite/Dockerfile
    volumes:
      - /app/node_modules
      - ./frontend:/app/frontend
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
      vite-app:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped

  postgres: 
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${}
      POSTGRES_DB: ${DB_NAME}  
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/postgres/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - app-network
    healthcheck:
        test: ["CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}"]
        interval: 10s
        timeout: 5s
        retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio
    container_name: jm_storage_images
    ports:
      - "9001:9001"
      - "9000:9000"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      : ${}
    healthcheck:
        test: ["CMD", "mc", "ls", "local/loja-jm"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 20s
    volumes:
      - minio_data:/data
      - ./scripts/entryMinio.sh:/usr/bin/entryMinio.sh
    entrypoint: /bin/sh
    command: /usr/bin/entryMinio.sh
    networks:
      - app-network
    restart: unless-stopped

  storage-migrator:
    build:
      context: .
      dockerfile: docker/migrator-images/Dockerfile
    container_name: jm_migrator
    working_dir: /app
    env_file: .env
    depends_on:
      minio:
          condition: service_healthy
    networks:
      - app-network
    volumes:
      - ./uploads:/app/uploads
      - ./infra:/app/infra
    restart: "no"

volumes:
  postgres_data:
  minio_data:

networks:
  app-network:
    driver: bridge